# main 브랜치에 코드가 올라오면(merge/push) 자동으로 Firebase Hosting에 배포합니다.
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAYROLL_DBCB0 }}
          channelId: live
          projectId: payroll-dbcb0
