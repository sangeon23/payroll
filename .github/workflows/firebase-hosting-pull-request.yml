# Pull Request가 올라오면 실제 배포 전에 '미리보기 URL'을 자동으로 만들어 줍니다.
# (main에 합치기 전에 바뀐 화면을 임시 주소에서 확인 가능)
name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAYROLL_DBCB0 }}
          projectId: payroll-dbcb0
