<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이지산업 급여관리</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --ink:#14171d; --ink2:#525a66; --line:#e6e8ee; --line2:#f0f2f6;
  --divider:#d3d8e0;
  --bg:#f4f6f9; --card:#ffffff; --accent:#2b6ef2; --accent-soft:#eaf1fe;
  --accent-line:#c3d8fc;
  --green:#0a8a4f; --green-soft:#e8f5ee; --red:#d23b34; --red-soft:#fdecea;
  --amber:#bd7400; --amber-soft:#fbf2e1; --gray:#8a919d;
  --head:#f6f8fb; --zebra:#f3f6fb; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:13px}

/* Layout */
.app{display:flex;min-height:100vh}
.side{width:214px;background:#fbfbfd;color:var(--ink2);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line)}
.side .brand{padding:20px 18px 16px;border-bottom:1px solid var(--line2)}
.side .brand h1{font-size:15.5px;color:var(--ink);font-weight:800;letter-spacing:-.3px}
.side .brand span{font-size:10px;color:var(--gray);display:block;margin-top:3px;letter-spacing:1.5px;font-weight:600}
.side nav{padding:10px 8px;flex:1;overflow-y:auto}
.side nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
  color:var(--ink2);padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:2px;transition:.12s}
.side nav button:hover{background:#eef1f5;color:var(--ink)}
.side nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.side nav button .ic{width:16px;text-align:center;font-size:14px;opacity:.85}
.side .foot{padding:12px 16px;border-top:1px solid var(--line2);font-size:11px;color:var(--gray)}
.side .sync{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#3fb950;flex-shrink:0}
.dot.off{background:#f85149}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar h2{font-size:18px;font-weight:800;letter-spacing:-.4px}
.topbar .sub{font-size:12px;color:var(--gray);margin-top:1px}
.topbar .right{display:flex;align-items:center;gap:10px}
.monthsel{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);
  border-radius:8px;padding:5px 8px}
.cotabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px}
.cotab{border:none;background:none;padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:700;color:var(--ink2);transition:.12s;white-space:nowrap}
.cotab:hover{color:var(--ink);background:#e9edf2}
.cotab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 2px rgba(20,23,29,.12);font-weight:800}
.monthsel button{background:none;border:none;font-size:15px;color:var(--ink2);padding:0 5px;line-height:1}
.monthsel .m{font-weight:700;font-size:14px;min-width:74px;text-align:center}
.content{padding:22px 24px;flex:1}

/* Buttons */
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:7px 13px;
  border-radius:7px;font-size:12.5px;font-weight:600;transition:.12s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg);border-color:#ccd2d9}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#1a5fd0}
.btn.green{background:var(--green);border-color:var(--green);color:#fff}
.btn.green:hover{filter:brightness(.94)}
.btn.ghost{background:none;border:none;color:var(--accent)}
.btn.ghost:hover{background:var(--accent-soft)}
.btn.sm{padding:4px 9px;font-size:11.5px}
.btn.danger{color:var(--red);border-color:var(--line)}
.btn.danger:hover{background:var(--red-soft);border-color:#f3c2bd}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 2px rgba(20,23,29,.03)}
.card-h{padding:14px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-h h3{font-size:14px;font-weight:800;letter-spacing:-.2px}
.card-h .desc{font-size:11.5px;color:var(--gray);margin-top:2px}
.card-b{padding:18px}
.card-b.flush{padding:0}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;position:relative;box-shadow:0 1px 2px rgba(20,23,29,.03)}
.stat::before{content:"";position:absolute;left:17px;top:0;width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--gray)}
.stat .lbl{font-size:11.5px;color:var(--ink2);font-weight:600;letter-spacing:.1px}
.stat .val{font-size:23px;font-weight:800;letter-spacing:-.6px;margin-top:7px;color:var(--ink)}
.stat .val.sm{font-size:18px}
.stat .foot{font-size:11px;color:var(--gray);margin-top:5px}
.stat.accent::before{background:var(--accent)}
.stat.green::before{background:var(--green)}
.stat.green .val{color:var(--green)}
.stat.red::before{background:var(--red)}
.stat.red .val{color:var(--red)}
.stat.amber::before{background:var(--amber)}
.stat.amber .val{color:var(--amber)}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
th,td{padding:6px 12px;text-align:right;border-bottom:1px solid var(--line2);border-right:1px solid var(--divider);white-space:nowrap}
th:last-child,td:last-child{border-right:none}
th{background:var(--head);font-weight:700;color:var(--ink2);font-size:11.5px;letter-spacing:.2px;position:sticky;top:0;z-index:5;border-bottom:1px solid var(--line);border-right:1px solid var(--divider);text-align:center}
th:last-child{border-right:none}
td.l{text-align:left}
th.c,td.c{text-align:center}
tbody tr:nth-child(even){background:var(--zebra)}
tbody tr:hover{background:var(--accent-soft)}
tr.sum{font-weight:800;background:#e7edf6}
tr.sum td{border-top:1.5px solid var(--divider);border-bottom:none;background:#e7edf6}
td.name{font-weight:700;color:var(--ink)}
td.muted{color:var(--gray)}
/* 넓은 표: 숫자는 한 줄 유지, 컨테이너 폭에 맞게 자동 축소(fitTables) */
table.fit{width:max-content;font-size:12px}
table.fit th,table.fit td{padding:6px 9px;white-space:nowrap}
table.fit tbody td{font-weight:500;color:var(--ink)}
table.fit td.muted,table.fit td.zero{font-weight:400;color:var(--gray)}
table.fit th{position:static;top:auto}
table.fit td.edit input{width:66px;font-size:12px;padding:2px 4px}
table.fit .tag{padding:1px 6px;font-size:10px}
table.fit .wnote{line-height:1.05;margin-top:1px}
.tag{display:inline-block;padding:1.5px 8px;border-radius:20px;font-size:10.5px;font-weight:700}
.tag.fixed{background:#eef0f3;color:#5a6270}
.tag.var{background:var(--accent-soft);color:var(--accent)}
.pos{color:var(--green);font-weight:700}
.neg{color:var(--red);font-weight:700}
.zero{color:var(--gray)}

/* Editable cells */
td.edit input{width:100%;border:1px solid transparent;background:none;text-align:right;padding:2px 6px;border-radius:5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
td.edit input:hover{border-color:var(--line)}
td.edit input:focus{border-color:var(--accent);background:#fff;outline:none;box-shadow:0 0 0 2px var(--accent-soft)}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.fld input,.fld select{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:#fff}
.fld input:focus,.fld select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px var(--accent-soft)}
.fld .hint{font-size:10.5px;color:var(--gray);margin-top:4px}
.fld input:disabled{background:var(--bg);color:var(--gray)}
.checkrow{display:flex;align-items:center;gap:7px;padding:7px 0}
.checkrow input{width:16px;height:16px;accent-color:var(--accent)}
.checkrow label{margin:0;font-size:13px;cursor:pointer}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(18,22,28,.5);display:none;align-items:flex-start;
  justify-content:center;z-index:100;overflow-y:auto;padding:40px 20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:16px;font-weight:700}
.modal-h .x{background:none;border:none;font-size:22px;color:var(--gray);line-height:1;padding:0 4px}
.modal-b{padding:22px}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;background:var(--bg);border-radius:0 0 14px 14px}
.sec-title{font-size:12px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;
  margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line2)}
.sec-title:first-child{margin-top:0}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--gray)}
.empty .big{font-size:34px;margin-bottom:10px;opacity:.5}
.empty p{font-size:13px;margin-bottom:14px}

/* Attendance grid */
.att-wrap{overflow-x:auto}
.att-tbl{font-size:11.5px}
.att-tbl th,.att-tbl td{padding:5px 4px;min-width:30px;border-right:1px solid var(--divider);border-bottom:1px solid var(--divider)}
.att-tbl th:last-child,.att-tbl td:last-child{border-right:none}
/* 헤더(날짜 줄) 명확히 구분 */
.att-tbl thead th{background:#eef1f6;color:var(--ink);font-weight:800;border-bottom:2.5px solid #9aa3b2;box-shadow:inset 0 -1px 0 #9aa3b2}
.att-tbl thead th.wend{background:#f6e6e6}
.att-tbl thead .dow{color:var(--ink2);font-weight:600}
.att-tbl td.dcell input{width:30px;text-align:center;border:1px solid transparent;padding:3px 1px;border-radius:4px}
.att-tbl td.dcell input:hover{border-color:var(--line)}
.att-tbl td.dcell input:focus{border-color:var(--accent);outline:none;background:var(--accent-soft)}
.att-tbl .wend{background:#fbf4f4}
.att-tbl tbody td{border-bottom:1px solid #b9c0cc}
.att-tbl .rowlbl{text-align:left;font-weight:600;position:sticky;left:0;background:#fff;z-index:2;min-width:76px;border-right:2px solid var(--line)}
.att-tbl .empname{font-weight:800;background:var(--bg);position:sticky;left:0;z-index:3;border-right:1px solid var(--line)}
/* 직원 블록 구분: 각 직원 첫 줄 위에 굵은 테두리 */
.att-tbl tr.empstart td{border-top:2px solid var(--divider)}
.att-tbl tbody tr:first-child.empstart td{border-top:none}
.att-tbl .calc{background:var(--green-soft);font-weight:700;color:#0a6b3d}
.att-tbl .dow{font-size:10px;color:var(--gray);font-weight:400}

/* 특근 지정 달력 */
.calwrap{max-width:300px;margin:0 auto}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.caldow{text-align:center;font-size:12px;font-weight:600;color:var(--ink2);padding:2px 0}
.caldow.sun{color:var(--red)}.caldow.sat{color:var(--accent)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calcell{height:38px;border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.1s;background:var(--bg);position:relative;user-select:none}
.calcell.empty{background:transparent;cursor:default}
.calcell:not(.empty):hover{background:var(--accent-soft)}
.calcell .cd{font-size:13px;font-weight:500;color:var(--ink)}
.calcell.sun .cd{color:var(--red)}.calcell.sat .cd{color:var(--accent)}
.calcell .ch{display:none}
/* 특근 지정 달력: on = 초록 강조 */
.calcell.on{background:var(--green)}
.calcell.on .cd{color:#fff;font-weight:700}
/* 근무일 달력: worked = 연두 */
.calcell.wd.worked{background:var(--green-soft)}
.calcell.wd.worked .cd{color:#0a6b3d;font-weight:600}
.calcell.wd:not(.worked) .cd{color:var(--gray)}
.calcell:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
/* 클릭 가능한 직원명 */
.att-tbl .empclick{cursor:pointer;transition:.12s}
.att-tbl .empclick:hover{background:var(--accent-soft);color:var(--accent)}
/* 4대보험 고지 () 직원부담 표시 */
td.edit{position:relative}
.wnote{font-size:9.5px;color:var(--gray);text-align:center;margin-top:2px;line-height:1;white-space:nowrap}
td.accrue{color:#0a6b3d;font-weight:600}
/* 넓은 표(.fit) 공통 가독성: 헤더 강조 + 행 구분 + 여백 */
table.fit{width:max-content;font-size:12.5px}
table.fit th,table.fit td{padding:8px 11px;white-space:nowrap}
table.fit thead th{background:#eef1f6;color:var(--ink);font-weight:800;border-bottom:2.5px solid #9aa3b2}
table.fit tbody td{border-bottom:1px solid #dfe3ea}
table.fit tbody tr:hover td{background:#eef4ff}
/* 급여/공제/차감 그룹 색상 구분 (급여대장·회계전달 공통) */
.fit th.grp-pay{background:#e4eefb!important;color:#2a4d7d}
.fit th.grp-ded{background:#e9edf3!important;color:#414b5c}
.fit th.grp-net{background:#f4ead6!important;color:#7a5622}
.fit td.cell-pay{background:#f7fafe}
.fit td.cell-ded{background:#f8fafb}
.fit td.cell-net{background:#fdf6ea;font-weight:700}
.fit td.sumcol,.fit th.sumcol{font-weight:700;border-left:1.5px solid #b9c0cc}
.fit td.cell-pay.sumcol{background:#e8f1fc}
.fit td.cell-ded.sumcol{background:#e9edf3}
.fit td.grp-start,.fit th.grp-start{border-left:2px solid #aab1bd}
.fit .dash{color:#cdd2da}
.fit tbody tr:hover td.cell-net{background:#fbefd8}
.fit tfoot .sum td{background:#e7edf6!important;font-weight:800;border-top:2px solid #9aa3b2}
.fit tfoot .sum td.cell-net{background:#f3e6cd!important}
.exp-tbl thead th{padding:8px 10px}
/* 연간 합산 탭 */
.atabs{display:flex;gap:6px;border-bottom:2px solid var(--line);margin-bottom:-2px}
.atab{padding:9px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray);border-bottom:2px solid transparent;transition:.12s}
.atab:hover{color:var(--ink)}
.atab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* 연간 합산 월 선택 */
.annualsel{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mlabel{font-size:11.5px;font-weight:700;color:var(--ink2);letter-spacing:.2px}
.mchips{display:inline-flex;gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px}
.mchip{padding:6px 0;min-width:42px;text-align:center;border:none;border-radius:7px;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray);transition:.12s}
.mchip:hover{color:var(--ink);background:#e7ebf1}
.mchip.on{background:var(--accent-soft);color:var(--accent);font-weight:700}
.mchip.on:hover{background:#dce9fd}
.mchip.nodata{color:#c3c8d1}
.mchip.nodata::after{content:none}
.mchip.on.nodata{color:var(--accent);opacity:.55}
.mactions{display:inline-flex;align-items:center;gap:6px}
.mact{border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--ink2);padding:5px 8px;border-radius:7px;transition:.12s}
.mact:hover{color:var(--accent);background:var(--accent-soft)}
.mact-div{width:1px;height:13px;background:var(--line)}
/* 직원 목록 드래그 정렬 */
.draggable-row{transition:background .1s}
.drag-handle{cursor:grab;user-select:none;font-weight:600}
.drag-handle:active{cursor:grabbing}
.draggable-row.dragging{opacity:.4;background:var(--accent-soft)}
.draggable-row.drag-over{box-shadow:inset 0 2px 0 var(--accent)}
/* 월 선택 (일괄 적용) */
.monthpick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mpick{display:flex;align-items:center;gap:7px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.12s}
.mpick:hover{border-color:var(--accent);background:var(--accent-soft)}
.mpick input{width:15px;height:15px;accent-color:var(--accent)}
.mpick.cur{background:var(--bg);color:var(--gray);cursor:default}
.mpick.cur:hover{border-color:var(--line);background:var(--bg)}

/* Payslip print */
.slips{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.slip{border:1.5px solid var(--ink);border-radius:2px;padding:0;background:#fff;font-size:12px}
.slip .sh{text-align:center;padding:10px;border-bottom:1.5px solid var(--ink);font-weight:800;font-size:14px}
.slip .meta{display:flex;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--line);font-size:11.5px}
.slip .cols{display:grid;grid-template-columns:1fr 1fr}
.slip .cols>div{padding:0}
.slip .col-l{border-right:1px solid var(--line)}
.slip .srow{display:flex;justify-content:space-between;padding:5px 12px;border-bottom:1px solid var(--line2)}
.slip .srow .k{color:var(--ink2)}
.slip .srow .v{font-weight:600}
.slip .sh2{background:var(--bg);font-weight:700;padding:5px 12px;border-bottom:1px solid var(--line);font-size:11px}
.slip .stot{display:flex;justify-content:space-between;padding:7px 12px;font-weight:800;background:#f0f3f7;border-top:1px solid var(--ink)}
.slip .net{text-align:center;padding:10px;font-size:15px;font-weight:800;background:var(--ink);color:#fff}
.slip .foot{text-align:center;padding:8px;font-size:11px;color:var(--gray)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 20px;border-radius:9px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;bottom:32px}

.page{display:none}
.page.active{display:block}

.diff-note{font-size:11px;color:var(--gray);margin-top:2px}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--gray);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.legend .sw{width:11px;height:11px;border-radius:3px}

@media print{
  .side,.topbar,.no-print{display:none!important}
  .content{padding:0}
  .slips{grid-template-columns:1fr 1fr;gap:8px}
  .slip{page-break-inside:avoid;border-color:#000}
  body{background:#fff;font-size:11px}
}
@media(max-width:820px){
  .side{width:56px}.side .brand h1,.side .brand span,.side nav button span:not(.ic),.side .foot{display:none}
  .side nav button{justify-content:center}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <h1>급여관리</h1>
      <span>PAYROLL SYSTEM</span>
    </div>
    <nav id="nav">

const firebaseConfig = {

window.__fb = { db, doc, getDoc, setDoc, collection, getDocs, onSnapshot };

/* ===== 급여관리 — 코어 로직 ===== */
/* db provided by firebase init */

/* ---------- 상수 ---------- */
const COMPANIES = [
  {id:'egsan', name:'이지산업'},
  {id:'cheolgi', name:'철기시대'},
  {id:'gscnt', name:'지에스시엔티'}
];
const DEDUCT_KEYS = ['gap','local','health','care','pension','emp','etc']; // 갑근세,지방소득세,건강,장기요양,국민연금,고용,기타
const DEDUCT_LABEL = {gap:'갑근세',local:'지방소득세',health:'건강보험',care:'장기요양',pension:'국민연금',emp:'고용보험',etc:'기타공제'};
const INS_KEYS = ['health','care','pension','emp','injury']; // 4대보험 + 산재 (실제 고지)
const INS_LABEL = {health:'건강보험',care:'장기요양',pension:'국민연금',emp:'고용보험',injury:'산재보험'};
// 보험별 처리 규칙:
//  input     = 고지서 표기 기준 ('half'=근로자분 50%만 표기 / 'full'=100% 총액 표기)
//  workerRatio = '입력값 → 근로자 부담분' 환산 (명세·차액대조 반영분 = 입력액 × 비율)
//  totalMult = '입력값 → 회사포함 100% 총액' 환산 배수
//  inDiff    = 차액 대조 기본 포함 여부 (고용보험은 직원별 '회사전액부담' 설정으로 개별 제어)
const INS_CONFIG = {
  health:  {input:'half', workerRatio:1,   totalMult:2, inDiff:true},   // 고지서 50%표기 → 입력=근로자분, 총액=×2
  care:    {input:'half', workerRatio:1,   totalMult:2, inDiff:true},   // 고지서 50%표기 → 입력=근로자분, 총액=×2
  pension: {input:'full', workerRatio:0.5, totalMult:1, inDiff:true},   // 고지서 100%표기 → 근로자=÷2, 총액=그대로
  emp:     {input:'full', workerRatio:0.9/2.05, totalMult:1, inDiff:true},   // 고지서 100%표기. 직원부담=고지×0.9/2.05 (근로자0.9%÷총2.05%, 150인미만 기준)
  injury:  {input:'full', workerRatio:0,   totalMult:1, inDiff:false}   // 산재=회사100%, 근로자0, 기록용
};
// 입력액 → 회사포함 100% 총액
function insTotalAmount(key, entered){ const cfg=INS_CONFIG[key]; return Math.round((entered||0)*(cfg?cfg.totalMult:1)); }
// 고지액 → 차액대조/명세 반영용 근로자 부담분
function insWorkerShare(key, noticed){ const cfg=INS_CONFIG[key]; return Math.round((noticed||0)*(cfg?cfg.workerRatio:1)); }
// 직원 가입 체크박스용 (산재는 사업장 단위라 제외)
const INS_ENROLL_KEYS = ['health','care','pension','emp'];
// 직원별 차액 대조 대상 보험 키 (고용보험은 회사전액부담 직원이면 제외)
function insDiffKeysFor(emp){
  return INS_KEYS.filter(k=>{
    if(!INS_CONFIG[k].inDiff) return false;
    if(k==='emp' && emp && emp.empFull) return false; // 고용보험 회사전액부담 → 대조 제외
    return true;
  });
}
const PAY_ITEMS = [
  {k:'base',t:'기본급'},{k:'senior',t:'근속수당'},{k:'ot',t:'잔업수당'},
  {k:'hol',t:'특근수당'},{k:'etc',t:'상여금'},{k:'car',t:'차량유지'},
  {k:'meal',t:'식대'},{k:'other',t:'기타'}
];

/* ---------- 상태 ---------- */
let state = {
  company: 'egsan',       // 현재 선택된 회사
  month: '2026-01',
  employees: [],          // 현재 회사 직원 마스터
  monthData: {},          // 현재 회사·월 데이터
  loaded: false
};
let empUnsub = null;      // 직원 실시간 구독 해제 함수

/* ---------- 유틸 ---------- */
const won = n => (Math.round(n||0)).toLocaleString('ko-KR');
const wonInput = n => (n===0||n==null)?'':Math.round(n).toLocaleString('ko-KR');
const parseNum = s => { const v = parseFloat(String(s).replace(/[^0-9.-]/g,'')); return isNaN(v)?0:v; };
const uid = () => 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const monthLabel = m => m.replace('-','.');
const daysInMonth = m => { const [y,mo]=m.split('-').map(Number); return new Date(y,mo,0).getDate(); };
const dowOf = (m,d) => { const [y,mo]=m.split('-').map(Number); return new Date(y,mo-1,d).getDay(); }; // 0=일
const DOW = ['일','월','화','수','목','금','토'];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t.__t); t.__t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- Firebase 동기화 ---------- */
function setSync(ok,txt){
  document.getElementById('syncDot').className = 'dot'+(ok?'':' off');
  document.getElementById('syncTxt').textContent = txt;
}
async function loadEmployees(){
  const snap = await getDocs(collection(db,'companies',state.company,'employees'));
  state.employees = [];
  snap.forEach(d=>state.employees.push({id:d.id,...d.data()}));
  state.employees.sort((a,b)=>(a.order||0)-(b.order||0));
}
async function saveEmployee(emp){
  await setDoc(doc(db,'companies',state.company,'employees',emp.id), emp);
}
async function deleteEmployeeDoc(id){
  const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  await deleteDoc(doc(db,'companies',state.company,'employees',id));
}
async function loadMonth(m){
  const snap = await getDoc(doc(db,'companies',state.company,'months',m));
  state.monthData = snap.exists()? snap.data() : {attendance:{},overrides:{},insurance:{},meta:{payDate:defaultPayDate(m)}};
  state.monthData.attendance = state.monthData.attendance||{};
  state.monthData.overrides = state.monthData.overrides||{};
  state.monthData.insurance = state.monthData.insurance||{};
  state.monthData.meta = state.monthData.meta||{payDate:defaultPayDate(m)};
}
let saveTimer=null;
function saveMonthDebounced(){
  clearTimeout(saveTimer);
  setSync(true,'저장 중…');
  const co=state.company, mo=state.month, data=state.monthData;
  saveTimer=setTimeout(async()=>{
    try{ await setDoc(doc(db,'companies',co,'months',mo), data); setSync(true,'동기화됨'); }
    catch(e){ setSync(false,'저장 실패'); console.error(e); }
  },600);
}
function defaultPayDate(m){ const [y,mo]=m.split('-').map(Number); const n=mo===12?`${y+1}-01`:`${y}-${String(mo+1).padStart(2,'0')}`; return n+'-20'; }

/* ---------- 계산 엔진 ---------- */
// 직원의 해당 월 근태 → 시간 집계
function attHours(empId){
  const a = state.monthData.attendance[empId] || {};
  const wk = a.weekday||{}, ot=a.overtime||{}, hol=a.holiday||{};
  const sum = o => Object.values(o).reduce((s,v)=>s+(parseNum(v)||0),0);
  return { weekday: sum(wk), overtime: sum(ot), holiday: sum(hol) };
}
// 기본근무 자동채우기: 월~금 평일 8h + 토요일 주휴 8h(유급), 잔업은 월~금 2h. 일요일 휴무. 특근은 수기.
function fillDefaultAttendance(empId, force=false){
  const dim = daysInMonth(state.month);
  const att = state.monthData.attendance[empId] || {weekday:{},overtime:{},holiday:{}};
  att.weekday=att.weekday||{}; att.overtime=att.overtime||{}; att.holiday=att.holiday||{};
  const hasData = Object.keys(att.weekday).length||Object.keys(att.overtime).length||Object.keys(att.holiday).length;
  if(hasData && !force) return false;
  if(force){ att.weekday={}; att.overtime={}; } // 특근(holiday)은 수기라 보존
  for(let d=1; d<=dim; d++){
    const dw = dowOf(state.month, d); // 0=일,6=토
    if(dw>=1 && dw<=5){ att.weekday[d]=8; att.overtime[d]=2; } // 월~금: 근무 8h + 잔업 2h
    else if(dw===6){ att.weekday[d]=8; } // 토요일: 주휴 8h (유급, 잔업 없음)
  }
  state.monthData.attendance[empId]=att;
  return true;
}
// 그 달 기본 스케줄 평일근무 시간(월~금 8h + 토 8h) — 만근 기준선
function standardWeekdayHours(){
  const dim = daysInMonth(state.month); let h=0;
  for(let d=1; d<=dim; d++){ const dw=dowOf(state.month,d); if(dw>=1&&dw<=6) h+=8; }
  return h;
}
// 직원 한 명의 급여 전체 계산 (지급/공제/차감)
function calcEmp(emp){
  const ov = (state.monthData.overrides[emp.id])||{};
  const pay = {};
  if(emp.type==='variable'){
    const h = attHours(emp.id);
    const rate = emp.hourlyRate||0;
    const otMul = emp.otMult??1.5, holMul = emp.holMult??1.5;
    const stdMonth = emp.stdHours??209;        // 월 기준시간(만근 시 기본급)
    const stdWeekday = standardWeekdayHours();  // 그 달 기본 스케줄 평일근무 시간(월~토 8h)
    const fullAttendance = stdWeekday>0 && h.weekday>=stdWeekday; // 만근이면 209h 고정
    const baseHours = fullAttendance ? stdMonth : h.weekday;      // 결근/중도면 실제시간
    pay.base = Math.round(baseHours * rate); // 기본급 = 근무시간 × 시급 (식대 포함된 값)
    pay.ot   = Math.round(h.overtime * rate * otMul);
    pay.hol  = Math.round(h.holiday * rate * holMul);
    pay.senior = num(emp.senior);
    pay.etc = num(emp.etcAllow); pay.car=num(emp.car); pay.meal=num(emp.meal); pay.other=num(emp.other);
    pay._hours = h; pay._rate=rate; pay._otRate=Math.round(rate*otMul); pay._holRate=Math.round(rate*holMul);
    pay._full = fullAttendance; pay._baseHours = baseHours; pay._stdMonth = stdMonth; pay._mealInc = num(emp.mealIncluded);
  } else {
    pay.base = num(emp.base);
    pay.senior = num(emp.senior);
    pay.ot = num(emp.ot); pay.hol=num(emp.hol);
    pay.etc = num(emp.etcAllow); pay.car=num(emp.car); pay.meal=num(emp.meal); pay.other=num(emp.other);
  }
  // override (수동 조정) 반영
  PAY_ITEMS.forEach(it=>{ if(ov['pay_'+it.k]!=null && ov['pay_'+it.k]!=='') pay[it.k]=parseNum(ov['pay_'+it.k]); });
  const gross = PAY_ITEMS.reduce((s,it)=>s+(pay[it.k]||0),0);

  // 공제
  const ded = {};
  DEDUCT_KEYS.forEach(k=>{
    const o = ov['ded_'+k];
    if(o!=null && o!=='') ded[k]=parseNum(o);
    else ded[k]=num(emp['ded_'+k]); // 직원 마스터 기본 공제값
  });
  const totDed = DEDUCT_KEYS.reduce((s,k)=>s+(ded[k]||0),0);
  const net = gross - totDed;
  return {pay,gross,ded,totDed,net};
}
const num = v => parseNum(v);

/* ---------- 라우팅 ---------- */
const PAGES = {
  dash:{t:'대시보드',s:'이번 달 급여 현황 요약'},
  emp:{t:'직원 관리',s:'직원 개별 등록·수정·삭제'},
  att:{t:'근태현황',s:'변동급 직원 근태 입력 → 잔업·특근 자동 계산'},
  ledger:{t:'급여대장',s:'전 직원 급여·공제·차감 지급액'},
  ins:{t:'4대보험 고지',s:'매월 실제 고지되는 보험료 기록'},
  diff:{t:'차액 정산',s:'명세서 공제액 vs 실제 고지액 대조'},
  slip:{t:'급여명세표',s:'직원별 급여명세서 출력'},
  export:{t:'회계 전달',s:'회계사무실 전달용 양식 · 엑셀 다운로드'},
  annual:{t:'연간 합산',s:'직원별 연간 공제·차액 집계 · 연말정산 상계'}
};
let curPage='dash';
function go(page){
  curPage=page;
  if(page!=='annual') window._annualCache=null; // 다른 페이지 갔다오면 연간은 새로 로드

}
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b) go(b.dataset.page);
});

/* ---------- 월 이동 ---------- */
function shiftMonth(delta){
  let [y,m]=state.month.split('-').map(Number);
  m+=delta; if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  state.month=`${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('curM').textContent=monthLabel(state.month);
  loadMonth(state.month).then(render);
}
document.getElementById('prevM').onclick=()=>shiftMonth(-1);
document.getElementById('nextM').onclick=()=>shiftMonth(1);

/* ---------- 렌더 디스패치 ---------- */
function render(){
  const el=document.getElementById('content');
  if(!state.loaded){ el.innerHTML='<div class="empty"><div class="big">◌</div><p>데이터 불러오는 중…</p></div>'; return; }
  ({dash:renderDash,emp:renderEmp,att:renderAtt,ledger:renderLedger,
    ins:renderIns,diff:renderDiff,slip:renderSlip,export:renderExport,annual:renderAnnual}[curPage])(el);
}

/* expose */
window.APP = { state, COMPANIES, calcEmp, attHours, fillDefaultAttendance, standardWeekdayHours, PAY_ITEMS, DEDUCT_KEYS, DEDUCT_LABEL, INS_KEYS, INS_LABEL, INS_CONFIG, INS_ENROLL_KEYS, insDiffKeysFor, insWorkerShare, insTotalAmount,
  won, wonInput, parseNum, num, uid, saveEmployee, deleteEmployeeDoc, loadEmployees, saveMonthDebounced,
  toast, render, go, daysInMonth, dowOf, DOW, monthLabel, PAGES, defaultPayDate, switchCompany };

/* ---------- 회사 전환 ---------- */
function subscribeEmployees(){
  if(empUnsub){ empUnsub(); empUnsub=null; }
  empUnsub = onSnapshot(collection(db,'companies',state.company,'employees'),snap=>{
    state.employees=[]; snap.forEach(d=>state.employees.push({id:d.id,...d.data()}));
    state.employees.sort((a,b)=>(a.order||0)-(b.order||0));
    if(state.loaded) render();
  });
}
async function switchCompany(coId){
  if(coId===state.company) return;
  state.company=coId;
  renderCompanyTabs();
  state.loaded=false; render();
  try{
    await loadEmployees();
    await loadMonth(state.month);
    state.loaded=true; setSync(true,'동기화됨');
    subscribeEmployees();
    render();
  }catch(e){ console.error(e); setSync(false,'연결 실패'); }
}
function renderCompanyTabs(){
  const wrap=document.getElementById('coTabs'); if(!wrap) return;
  wrap.innerHTML=COMPANIES.map(c=>
    `<button class="cotab${c.id===state.company?' active':''}" data-co="${c.id}">${c.name}</button>`).join('');
  wrap.querySelectorAll('button').forEach(b=>b.onclick=()=>switchCompany(b.dataset.co));
}

/* ---------- 초기화 ---------- */
async function __bootInit(){
  document.getElementById('curM').textContent=monthLabel(state.month);
  renderCompanyTabs();
  try{
    setSync(false,'연결 중…');
    await loadEmployees();
    await loadMonth(state.month);
    state.loaded=true;
    setSync(true,'동기화됨');
    subscribeEmployees();
    render();
  }catch(e){
    console.error(e); setSync(false,'연결 실패');
    document.getElementById('content').innerHTML=
      '<div class="card"><div class="card-b"><b>Firebase 연결에 실패했습니다.</b><br>'+
      'Firestore 데이터베이스가 생성되었는지, 보안 규칙이 읽기/쓰기를 허용하는지 확인하세요.<br>'+
      '<span style="color:#888;font-size:12px">'+(e.message||e)+'</span></div></div>';
  }
}


(function(){
/* ===== 페이지 렌더러 ===== */
const A = window.APP;
const {won,wonInput,parseNum,num,uid,toast,daysInMonth,dowOf,DOW,monthLabel} = A;

/* 헬퍼: 전 직원 계산 결과 */
function allCalc(){
  return A.state.employees.map(e=>({emp:e,c:A.calcEmp(e)}));
}
function grandTotals(){
  const rows=allCalc(); const g={gross:0,totDed:0,net:0,ded:{}};
  A.DEDUCT_KEYS.forEach(k=>g.ded[k]=0);
  A.PAY_ITEMS.forEach(it=>g['pay_'+it.k]=0);
  rows.forEach(({c})=>{
    g.gross+=c.gross; g.totDed+=c.totDed; g.net+=c.net;
    A.DEDUCT_KEYS.forEach(k=>g.ded[k]+=c.ded[k]||0);
    A.PAY_ITEMS.forEach(it=>g['pay_'+it.k]+=c.pay[it.k]||0);
  });
  return {rows,g};
}

/* ========== 1. 대시보드 ========== */
window.renderDash = function(el){
  const {rows,g}=grandTotals();
  const md=A.state.monthData;
  // 4대보험 차액 (국민연금 근로자 50%, 고용보험은 회사전액부담 직원 제외)

// 직원 목록 드래그 정렬
function attachEmpDragSort(){
  const tbody=document.getElementById('empTbody'); if(!tbody) return;
  let dragEl=null;
  tbody.querySelectorAll('tr.draggable-row').forEach(tr=>{
    tr.addEventListener('dragstart',e=>{ dragEl=tr; tr.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    tr.addEventListener('dragend',()=>{ tr.classList.remove('dragging'); tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); });
    tr.addEventListener('dragover',e=>{ e.preventDefault();
      const after=(e.clientY - tr.getBoundingClientRect().top) > tr.offsetHeight/2;
      tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
      tr.classList.add('drag-over');
      if(dragEl && dragEl!==tr){
        if(after) tr.after(dragEl); else tr.before(dragEl);
      }
    });
  });
  tbody.addEventListener('drop',e=>{ e.preventDefault(); saveEmpOrder(); });
}
async function saveEmpOrder(){
  const tbody=document.getElementById('empTbody'); if(!tbody) return;
  const ids=[...tbody.querySelectorAll('tr.draggable-row')].map(tr=>tr.dataset.id);
  const {db,doc,setDoc,getDoc}=window.__fb;
  try{
    // order를 새 순서대로 부여하고 저장
    for(let i=0;i<ids.length;i++){
      const emp=A.state.employees.find(e=>e.id===ids[i]);
      if(emp){ emp.order=i+1;
        const ref=doc(db,'companies',A.state.company,'employees',emp.id);
        const snap=await getDoc(ref); const data=snap.exists()?snap.data():emp;
        data.order=i+1; await setDoc(ref,data);
      }
    }
    // 로컬 정렬 반영 후 재렌더
    A.state.employees.sort((a,b)=>(a.order||0)-(b.order||0));
    A.render();
    toast('순서가 변경되었습니다');
  }catch(e){ toast('순서 저장 실패'); console.error(e); }
}
function insBadges(e){
  const on=A.INS_ENROLL_KEYS.filter(k=>e['ins_'+k]);
  if(!on.length) return '<span class="zero">미가입</span>';
  return on.map(k=>({health:'건',care:'요',pension:'국',emp:'고'}[k])).join(' ');
}

    }
  }catch(e){ toast('복사 실패'); console.error(e); }
};

// 변동급 직원의 별도 식대(meal)를 '기본급 포함 식대(mealIncluded)'로 일괄 전환
window.migrateMeal = async function(){
  const targets=A.state.employees.filter(e=>e.type==='variable' && A.num(e.meal)>0 && !A.num(e.mealIncluded));
  if(!targets.length){
    // 이미 mealIncluded 있는 직원 안내
    const done=A.state.employees.filter(e=>e.type==='variable' && A.num(e.mealIncluded)>0);
    toast(done.length? '이미 모두 전환되어 있습니다' : '전환할 변동급 직원이 없습니다');
    return;
  }
  const names=targets.map(e=>`${e.name}(${A.won(e.meal)})`).join(', ');

// 특근 지정 달력: 전체 변동급 직원이 그 날 특근 8h면 '지정됨'
function holidayCalendar(vars){
  const m=A.state.month; const dim=daysInMonth(m);
  const first=dowOf(m,1); // 1일 요일
  const isHol=d=> vars.length>0 && vars.every(e=>{
    const h=(A.state.monthData.attendance[e.id]||{}).holiday||{}; return A.parseNum(h[d])>0;
  });
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="calcell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const dw=dowOf(m,d); const on=isHol(d);
    const cls=['calcell']; if(dw===0)cls.push('sun'); if(dw===6)cls.push('sat'); if(on)cls.push('on');
    cells+=`<div class="${cls.join(' ')}" data-day="${d}" role="button" tabindex="0">
      <span class="cd">${d}</span>${on?'<span class="ch">특근 8h</span>':''}</div>`;
  }
  return `<div class="calwrap">
    <div class="calhead">${DOW.map((w,i)=>`<div class="caldow ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}</div>
    <div class="calgrid">${cells}</div>
  </div>`;
}
function attachCalendar(vars, inModal){
  document.querySelectorAll('.calcell[data-day]').forEach(cell=>{
    const toggle=()=>{
      const d=cell.dataset.day; const md=A.state.monthData;
      const on = vars.length>0 && vars.every(e=>{const h=(md.attendance[e.id]||{}).holiday||{};return A.parseNum(h[d])>0;});
      vars.forEach(e=>{
        md.attendance[e.id]=md.attendance[e.id]||{weekday:{},overtime:{},holiday:{}};
        md.attendance[e.id].holiday=md.attendance[e.id].holiday||{};
        if(on) delete md.attendance[e.id].holiday[d]; else md.attendance[e.id].holiday[d]=8;
      });
      A.saveMonthDebounced();
      if(inModal){
        // 팝업 안에서는 달력만 다시 그림 (뒤 표는 완료 시 갱신)
        const host=document.getElementById('holCalHost');
        if(host){ host.innerHTML=holidayCalendar(vars); attachCalendar(vars, true); }
      } else {
        A.render();
      }
    };
    cell.addEventListener('click',toggle);
    cell.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();toggle();}});
  });
}
/* 직원별 근무일(평일근무) 달력 팝업 — 연두=근무, 흰색=결근 */
let _workdayDraft = null;
window.openWorkdayModal = function(empId){
  const e=A.state.employees.find(x=>x.id===empId); if(!e)return;
  const wk=(A.state.monthData.attendance[empId]||{}).weekday||{};

  _workdayDraft={empId, worked};

  box.innerHTML=`
    <div class="modal-h"><h3>${esc(e.name)||'직원'} · ${monthLabel(A.state.month)} 근무일</h3><button class="x" onclick="closeModal()">×</button></div>

      <p style="color:var(--gray);margin-bottom:14px;font-size:12px">날짜를 클릭하면 연두 ↔ 흰색으로 바뀝니다. 확인을 누르면 흰색 날은 평일근무·잔업이 0으로 처리됩니다.</p>
      <div id="wdCalHost">${workdayCalendar()}</div>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="applyWorkday()">확인</button>
    </div>`;
  document.getElementById('modalBg').classList.add('show');
  attachWorkdayCalendar();
};
function workdayCalendar(){
  const m=A.state.month; const dim=daysInMonth(m); const first=dowOf(m,1);
  const {worked}=_workdayDraft;
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="calcell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const dw=dowOf(m,d); const on=worked.has(d);
    const cls=['calcell','wd']; if(dw===0)cls.push('sun'); if(dw===6)cls.push('sat'); if(on)cls.push('worked');
    cells+=`<div class="${cls.join(' ')}" data-day="${d}" role="button" tabindex="0"><span class="cd">${d}</span></div>`;
  }
  return `<div class="calwrap">
    <div class="calhead">${DOW.map((w,i)=>`<div class="caldow ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}</div>
    <div class="calgrid">${cells}</div>
  </div>`;
}
function attachWorkdayCalendar(){
  document.querySelectorAll('#wdCalHost .calcell[data-day]').forEach(cell=>{
    const toggle=()=>{
      const d=parseInt(cell.dataset.day);
      if(_workdayDraft.worked.has(d)) _workdayDraft.worked.delete(d); else _workdayDraft.worked.add(d);
      document.getElementById('wdCalHost').innerHTML=workdayCalendar();
      attachWorkdayCalendar();
    };
    cell.addEventListener('click',toggle);
    cell.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();toggle();}});
  });
}
window.applyWorkday = function(){
  const {empId,worked}=_workdayDraft;
  const md=A.state.monthData; const dim=daysInMonth(A.state.month);
  md.attendance[empId]=md.attendance[empId]||{weekday:{},overtime:{},holiday:{}};
  const att=md.attendance[empId];
  att.weekday=att.weekday||{}; att.overtime=att.overtime||{};
  for(let d=1;d<=dim;d++){
    if(worked.has(d)){
      if(!A.parseNum(att.weekday[d])) att.weekday[d]=8; // 근무: 8h (기존값 유지)
    } else {
      delete att.weekday[d]; // 결근: 평일근무·잔업 0
      delete att.overtime[d];
    }
  }
  A.saveMonthDebounced(); closeModal(); A.render();
  toast('근무일이 반영되었습니다');
};

function attRows(e,days){
  const a=A.state.monthData.attendance[e.id]||{weekday:{},overtime:{},holiday:{}};
  const c=A.calcEmp(e); const h=c.pay._hours||{weekday:0,overtime:0,holiday:0};
  const rate=e.hourlyRate||0, otR=Math.round(rate*(e.otMult??1.5)), holR=Math.round(rate*(e.holMult??1.5));
  const cell=(kind,d,val)=>`<td class="dcell ${(dowOf(A.state.month,d)%6===0)?'wend':''}"><input data-emp="${e.id}" data-kind="${kind}" data-day="${d}" value="${val||''}" inputmode="numeric"></td>`;
  const line=(kind,label,dayObj,tot,rateV,amt,badge)=>`<tr class="${label==='평일근무'?'empstart':''}">
    ${label==='평일근무'?`<td class="empname l empclick" rowspan="3" onclick="openWorkdayModal('${e.id}')" title="클릭하면 근무일 달력">${esc(e.name)||'미입력'} <span style="font-size:9px;color:var(--accent)">📅</span></td>`:''}
    <td class="rowlbl l">${label}${badge||''}</td>
    ${days.map(d=>cell(kind,d,dayObj[d])).join('')}
    <td class="calc">${tot||0}</td><td class="muted">${won(rateV)}</td><td class="calc">${won(amt)}</td>
  </tr>`;
  // 평일근무: 만근이면 기준시간(209) 표시, 아니면 실제 입력시간
  const wkTot = c.pay._full ? c.pay._stdMonth : h.weekday;
  const wkBadge = c.pay._full
    ? ' <span class="tag" style="background:var(--green-soft);color:#0a6b3d">만근 209h</span>'
    : ' <span class="tag" style="background:var(--amber-soft);color:#8a4b00">일할 '+h.weekday+'h</span>';
  return line('weekday','평일근무',a.weekday||{},wkTot,rate,c.pay.base,wkBadge)
       + line('overtime','잔업시간',a.overtime||{},h.overtime,otR,c.pay.ot)
       + line('holiday','특근시간',a.holiday||{},h.holiday,holR,c.pay.hol);
}
function attachAttHandlers(){

(function(){

/* 엑셀식 셀 이동: 입력칸에 Tab/화살표/Enter 네비게이션 부착.
   각 input에 data-row(행 인덱스), data-col(열 인덱스)이 있으면 좌표 기반으로 정확히 이동.
   없으면 표시 순서(DOM 순서)로 이동. */
function attachGridNav(inputs){
  if(!inputs.length) return;
  const hasCoord = inputs[0].dataset.row!==undefined && inputs[0].dataset.col!==undefined;
  const focusEl=el=>{ if(el){ el.focus(); el.select&&el.select(); } };
  if(hasCoord){
    // 좌표 맵 구성
    const map={}; let maxRow=0, maxCol=0;
    inputs.forEach(inp=>{ const r=+inp.dataset.row, c=+inp.dataset.col; map[r+':'+c]=inp; if(r>maxRow)maxRow=r; if(c>maxCol)maxCol=c; });
    const find=(r,c,dr,dc)=>{ // r,c에서 dr,dc 방향으로 다음 존재하는 셀
      let nr=r+dr, nc=c+dc;

        if(map[nr+':'+nc]) return map[nr+':'+nc];
        nc+=dc||1; if(dr&&!dc){ // 상하 이동인데 그 열이 비었으면 같은 열 계속
          nr+=dr; nc=c; if(nr<0||nr>maxRow) return null; if(map[nr+':'+nc]) return map[nr+':'+nc]; continue; }
      }

    };
    inputs.forEach(inp=>{
      inp.addEventListener('keydown',ev=>{
        const r=+inp.dataset.row, c=+inp.dataset.col; let t=null;
        if(ev.key==='Enter'){ t=find(r,c,ev.shiftKey?-1:1,0); }
        else if(ev.key==='Tab'){ t=find(r,c,0,ev.shiftKey?-1:1); }
        else if(ev.key==='ArrowDown'){ t=find(r,c,1,0); }
        else if(ev.key==='ArrowUp'){ t=find(r,c,-1,0); }
        else if(ev.key==='ArrowRight'){ if(inp.selectionStart===inp.value.length) t=find(r,c,0,1); }
        else if(ev.key==='ArrowLeft'){ if(inp.selectionStart===0) t=find(r,c,0,-1); }
        else return;
        if(t){ ev.preventDefault(); inp.blur(); focusEl(t); }
      });
    });
  } else {
    inputs.forEach((inp,idx)=>{
      inp.addEventListener('keydown',ev=>{
        let t=null;
        if(ev.key==='Enter'||ev.key==='Tab'){ t=idx+((ev.shiftKey)?-1:1); }
        else if(ev.key==='ArrowRight'){ if(inp.selectionStart===inp.value.length) t=idx+1; }
        else if(ev.key==='ArrowLeft'){ if(inp.selectionStart===0) t=idx-1; }
        else return;
        if(t!==null && t>=0 && t<inputs.length){ ev.preventDefault(); inp.blur(); focusEl(inputs[t]); }
      });
    });
  }
}
// 회계 전달용 지급항목: 변동급이면서 '기본급 포함 식대'가 있으면 기본급에서 식대를 분리.
// 단, 기본급이 분리할 식대(inc) 이상일 때만 분리한다. 기본급 < inc(0 포함)이면 분리 안 함.
function exportPay(emp,c){
  const p={}; A2.PAY_ITEMS.forEach(it=>p[it.k]=c.pay[it.k]||0);
  const inc=A2.num(emp.mealIncluded);
  const base=c.pay.base||0;
  if(emp.type==='variable' && inc>0 && base>=inc){
    p.base = base - inc;        // 기본급에서 식대 빼기 (기본급 ≥ 식대일 때만)
    p.meal = (p.meal||0) + inc; // 식대로 이동 (합계 불변)
  }
  return p;
}
// 연말정산용 차액 = (건강 명세−고지) + (장기요양 명세−고지). 명세가 크면 양수.
// 연말정산 적립분 = 건강·장기요양 각각 (명세−고지), 항목별로 음수면 0(적립 하한).
// 음수(고지>명세)인 항목은 신규 적립 없이 기존 적립금에서 상계되므로 회계전달엔 0으로 넘긴다.
function yearEndAdjust(emp,c){
  const md=A2.state.monthData; const ins=md.insurance[emp.id]||{};
  let adj=0;
  ['health','care'].forEach(k=>{
    if(!emp['ins_'+k]) return;
    const ded=c.ded[k]||0;
    const noticed=A2.insWorkerShare(k, A2.num(ins[k])); // 근로자부담분(건강·요양은 비율1)
    const itemDiff = ded - noticed;                     // 명세 − 고지
    if(itemDiff>0) adj += itemDiff;                     // 항목별 하한 0: 양수만 신규 적립
  });
  return adj;
}

function nextMonth(m, off){
  let [y,mm]=m.split('-').map(Number); mm+=off;
  while(mm<1){mm+=12;y--;} while(mm>12){mm-=12;y++;}
  return `${y}-${String(mm).padStart(2,'0')}`;
}
window.applyDedForward = async function(){
  const cur=A2.state.month;
  const rows=A2.state.employees;
  // 적용 범위 계산
  const mode=document.querySelector('input[name="fwdmode"]:checked').value;
  let months=[];
  if(mode==='until'){
    const until=document.getElementById('fwd_until').value;
    for(let off=1; off<=36; off++){ const m=nextMonth(cur,off); months.push(m); if(m===until) break; }
  } else {
    for(let off=1; off<=12; off++){ months.push(nextMonth(cur,off)); }
  }
  // 현재 달 각 직원 실제 공제값 수집
  const dedByEmp={};
  rows.forEach(e=>{ const c=A2.calcEmp(e); dedByEmp[e.id]={}; A2.DEDUCT_KEYS.forEach(k=>{ dedByEmp[e.id][k]=c.ded[k]||0; }); });
  const {db,doc,getDoc,setDoc}=window.__fb;
  try{
    for(const m of months){

      const snap=await getDoc(ref);
      const data=snap.exists()?snap.data():{attendance:{},overrides:{},insurance:{},meta:{payDate:A2.defaultPayDate(m)}};
      data.overrides=data.overrides||{};

      });
      data.meta=data.meta||{payDate:A2.defaultPayDate(m)};
      await setDoc(ref,data);
    }
    closeModal();
    toast(`${months.length}개 달에 공제가 적용되었습니다`);
  }catch(e){ toast('적용 실패'); console.error(e); }
};

function updateInsTotals(el){
  const md=A2.state.monthData; const emps=A2.state.employees;
  const gIn={}, gTot={}, gWorker={}; A2.INS_KEYS.forEach(k=>{gIn[k]=0;gTot[k]=0;gWorker[k]=0;});
  emps.forEach(e=>{ const ins=md.insurance[e.id]||{};
    A2.INS_KEYS.forEach(k=>{ const enrolled=k==='injury'?true:e['ins_'+k]; if(!enrolled)return;
      const v=num(ins[k]); gIn[k]+=v; gTot[k]+=A2.insTotalAmount(k,v);
      gWorker[k]+=(k==='emp'&&e.empFull)?0:A2.insWorkerShare(k,v);
    });
  });
  const foot=el.querySelectorAll('tfoot tr');
  if(foot.length>=2){
    const wc=foot[0].querySelectorAll('td'); // [라벨(colspan2), k..., 합계]
    A2.INS_KEYS.forEach((k,i)=>{ if(wc[i+1]) wc[i+1].textContent=won(gWorker[k]); });
    if(wc[wc.length-1]) wc[wc.length-1].textContent=won(A2.INS_KEYS.reduce((s,k)=>s+gWorker[k],0));
    const cc=foot[1].querySelectorAll('td'); let tot=0;
    A2.INS_KEYS.forEach((k,i)=>{ if(cc[i+1]) cc[i+1].textContent=won(gTot[k]); tot+=gTot[k]; });
    if(cc[cc.length-1]) cc[cc.length-1].innerHTML='<b>'+won(tot)+'</b>';
  }
  // 입력 합계(각 행 마지막 칸)도 갱신 + 100% 항목 () 직원부담 갱신
  emps.forEach((e,ri)=>{ const ins=md.insurance[e.id]||{}; let sub=0; A2.INS_KEYS.forEach(k=>{ if((k==='injury'?true:e['ins_'+k])) sub+=num(ins[k]); });
    const row=el.querySelectorAll('tbody tr')[ri]; if(row){ const tds=row.querySelectorAll('td'); const last=tds[tds.length-1]; if(last) last.innerHTML='<b>'+won(sub)+'</b>';
      // 국민연금·고용보험 () 갱신 (고지값 기반)
      A2.INS_KEYS.forEach(k=>{
        if(A2.INS_CONFIG[k] && A2.INS_CONFIG[k].input==='full' && k!=='injury'){

              else note.textContent='직원 '+won(A2.insWorkerShare(k, num(ins[k])));

        }

function monthList(centerMonth, before, after){
  const [y,m]=centerMonth.split('-').map(Number);
  const arr=[];
  for(let off=-before; off<=after; off++){
    let yy=y, mm=m+off;
    while(mm<1){mm+=12;yy--;} while(mm>12){mm-=12;yy++;}
    arr.push(`${yy}-${String(mm).padStart(2,'0')}`);
  }
  return arr;
}

/* 엑셀 내보내기 (SheetJS) */
async function ensureXLSX(){
  if(window.XLSX) return window.XLSX;
  await new Promise((res,rej)=>{const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  return window.XLSX;
}
function tableToAOA(tblId){
  const t=document.getElementById(tblId); const aoa=[];
  t.querySelectorAll('tr').forEach(tr=>{
    const row=[]; tr.querySelectorAll('th,td').forEach(cell=>{
      let txt=cell.textContent.trim().replace(/,/g,'');
      if(txt==='-'){ row.push(0); return; } // 대시(0 표시)는 숫자 0으로
      const n=parseFloat(txt); row.push((txt!==''&&!isNaN(n)&&/^[\d.+-]+$/.test(txt))?n:cell.textContent.trim());
    }); aoa.push(row);
  });
  return aoa;
}
window.exportXLSX = async function(){
  const XLSX=await ensureXLSX();
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(tableToAOA('expTbl'));
  XLSX.utils.book_append_sheet(wb,ws,'급여대장');
  XLSX.writeFile(wb,`${coName()}_급여대장_${A2.state.month}.xlsx`);
  toast('엑셀 다운로드 완료');
};

window._annualCache = null;  // {company, year, monthDatas, decided}
window.renderAnnual = async function(el){
  const year = A2.state.month.split('-')[0];
  const company = A2.state.company;
  const allMonths=[]; for(let m=1;m<=12;m++) allMonths.push(`${year}-${String(m).padStart(2,'0')}`);
  if(!window._annualMonths || window._annualMonthsYear!==year){
    window._annualMonths=new Set(allMonths); window._annualMonthsYear=year;
  }
  // 캐시가 현재 회사·연도와 맞으면 재로드 없이 표만 그림
  const cache=window._annualCache;
  if(cache && cache.company===company && cache.year===year){
    paintAnnual(el); return;
  }
  // 로드 필요
  el.innerHTML=`<div class="empty"><div class="big">◌</div><p>${year}년 데이터 집계 중…</p></div>`;
  const {db,doc,getDoc}=window.__fb;
  const monthDatas={};
  for(const m of allMonths){
    try{ const snap=await getDoc(doc(db,'companies',company,'months',m));
      monthDatas[m]=snap.exists()?snap.data():{overrides:{},insurance:{},attendance:{}};
    }catch(e){ monthDatas[m]={overrides:{},insurance:{},attendance:{}}; }
  }
  let decided={};
  try{ const asnap=await getDoc(doc(db,'companies',company,'annual',year));
    if(asnap.exists()) decided=asnap.data().decided||{};
  }catch(e){}
  window._annualCache={company, year, monthDatas, decided};
  window._annualData={year, decided};
  paintAnnual(el);
};
// 캐시된 데이터로 표만 그림 (재로드 없음)
function paintAnnual(el){
  const {year, monthDatas, decided}=window._annualCache;
  window._annualData={year, decided};
  const allMonths=[]; for(let m=1;m<=12;m++) allMonths.push(`${year}-${String(m).padStart(2,'0')}`);
  const selMonths=allMonths.filter(m=>window._annualMonths.has(m));

  const emps=A2.state.employees;
  const ALL_ITEMS=[
    {k:'gap',   label:'갑근세',   type:'tax'},
    {k:'local', label:'지방소득세', type:'tax'},
    {k:'health',label:'건강보험',  type:'ins'},
    {k:'care',  label:'장기요양',  type:'ins'},
    {k:'pension',label:'국민연금', type:'ins'}
  ];
  const tab = window._annualTab || 'ins';
  const ITEMS = ALL_ITEMS.filter(it=> tab==='tax' ? it.type==='tax' : it.type==='ins');

  // 선택된 달만 집계
  function empAnnual(emp){
    const r={}; ALL_ITEMS.forEach(it=>r[it.k]={paid:0,noticed:0});
    selMonths.forEach(m=>{
      const mdSaved=monthDatas[m];
      const ov=(mdSaved.overrides||{})[emp.id]||{};
      const ins=(mdSaved.insurance||{})[emp.id]||{};
      ALL_ITEMS.forEach(it=>{
        const paid = ('ded_'+it.k in ov) ? A2.num(ov['ded_'+it.k]) : A2.num(emp['ded_'+it.k]);
        r[it.k].paid += paid;
        if(it.type==='ins'){ r[it.k].noticed += A2.insWorkerShare(it.k, A2.num(ins[it.k])); }
      });
    });
    return r;
  }
  const rows=emps.map(e=>({emp:e, a:empAnnual(e)}));
  const tot={}; ITEMS.forEach(it=>tot[it.k]={paid:0,noticed:0,decided:0});
  rows.forEach(({emp,a})=>ITEMS.forEach(it=>{ tot[it.k].paid+=a[it.k].paid; tot[it.k].noticed+=a[it.k].noticed;
    tot[it.k].decided += A2.num((decided[emp.id]||{})[it.k]); }));

  const won=A2.won;
  const tabBtn=(id,label)=>`<button class="atab ${tab===id?'active':''}" onclick="setAnnualTab('${id}')">${label}</button>`;
  // 월 선택 칩
  const monthChips = allMonths.map((m,i)=>{
    const on=window._annualMonths.has(m); const has=monthHasData(monthDatas[m], emps);
    return `<button class="mchip ${on?'on':''} ${has?'':'nodata'}" onclick="toggleAnnualMonth('${m}')" title="${has?'데이터 있음':'데이터 없음'}">${i+1}월</button>`;
  }).join('');
  const helpText = tab==='tax'
    ? `· <b>납부합계</b>: 선택한 달 급여명세에서 원천징수한 세액 합계<br>· <b>결정세액</b>: 연말정산 결정세액(추징) — 칸에 직접 입력<br>· <b>차액</b> = 납부합계 − 결정세액. <span class="pos">양수</span>면 환급, <span class="neg">음수</span>면 추가납부.`
    : `· <b>지급(명세)</b>: 선택한 달 급여명세에서 실제 공제한 금액 합계 (고지+α 적립분 포함)<br>· <b>고지</b>: 선택한 달 공단 고지 근로자부담 합계<br>· <b>연말정산</b>: 연말정산 추징(결정) 금액 — 칸에 직접 입력<br>· <b>최종잔액</b> = (지급 − 고지) − 연말정산. <span class="pos">양수</span>면 적립분이 추징금보다 많아 남은 것, <span class="neg">음수</span>면 부족분.`;

  el.innerHTML=`
  <div class="card">
    <div class="card-h"><div><h3>${coName()} ${year}년 연간 합산 · 연말정산 상계</h3>
      <div class="desc">매월 <b>명세 공제 − 고지</b>로 쌓인 적립 차액을 연말정산 결정세액(추징금)과 상계합니다.</div></div>
      <button class="btn green" onclick="exportAnnualXLSX()">↧ 엑셀</button></div>
    <div class="card-b" style="padding-bottom:8px">
      <div class="annualsel">
        <span class="mlabel">집계 월</span>
        <div class="mchips">${monthChips}</div>
        <div class="mactions"><button class="mact" onclick="annualSelectAll(true)">전체 선택</button><span class="mact-div"></span><button class="mact" onclick="annualSelectAll(false)">전체 해제</button></div>
      </div>
      <div class="atabs" style="margin-top:12px">${tabBtn('tax','세금 (갑근세·지방소득세)')}${tabBtn('ins','4대보험 (건강·장기요양·국민연금)')}</div>
    </div>
    <div class="card-b flush"><div class="tbl-wrap"><table id="annualTbl" class="fit">
      <thead>
        <tr><th class="c" rowspan="2">순번</th><th class="l" rowspan="2">성명</th><th class="l" rowspan="2">직책</th>
          ${ITEMS.map(it=> it.type==='tax'? `<th colspan="3">${it.label}</th>` : `<th colspan="4">${it.label}</th>`).join('')}
        </tr>
        <tr>
          ${ITEMS.map(it=> it.type==='tax'? `<th>납부합계</th><th>결정세액</th><th>차액</th>` : `<th>지급(명세)</th><th>고지</th><th>연말정산</th><th>최종잔액</th>`).join('')}
        </tr>
      </thead>
      <tbody>
      ${rows.map(({emp,a},i)=>{
        const dec=decided[emp.id]||{};
        return `<tr><td class="c muted">${i+1}</td><td class="name l">${esc(emp.name)||'-'}</td><td class="l muted">${esc(emp.title||'')}</td>
        ${ITEMS.map(it=>{
          const paid=a[it.k].paid, noticed=a[it.k].noticed;
          const decVal=A2.num(dec[it.k]);
          if(it.type==='tax'){
            const diff=paid-decVal;
            return `<td>${won(paid)}</td>
              <td class="edit"><input value="${decVal?decVal.toLocaleString('ko-KR'):''}" data-emp="${emp.id}" data-item="${it.k}" inputmode="numeric" style="width:90px"></td>
              <td class="${diff===0?'zero':diff>0?'pos':'neg'}">${diff>0?'+':''}${won(diff)}</td>`;
          } else {
            const accrued=paid-noticed; const finalBal=accrued-decVal;
            return `<td>${won(paid)}</td><td>${won(noticed)}</td>
              <td class="edit"><input value="${decVal?decVal.toLocaleString('ko-KR'):''}" data-emp="${emp.id}" data-item="${it.k}" inputmode="numeric" style="width:90px"></td>
              <td class="${finalBal===0?'zero':finalBal>0?'pos':'neg'}"><b>${finalBal>0?'+':''}${won(finalBal)}</b></td>`;
          }
        }).join('')}
        </tr>`;
      }).join('')||`<tr><td colspan="20"><div class="empty"><p>직원이 없습니다.</p></div></td></tr>`}
      </tbody>
      <tfoot><tr class="sum"><td colspan="3" class="l">합계</td>
        ${ITEMS.map(it=>{
          if(it.type==='tax'){ const diff=tot[it.k].paid-tot[it.k].decided;
            return `<td>${won(tot[it.k].paid)}</td><td>${won(tot[it.k].decided)}</td><td class="${diff>0?'pos':diff<0?'neg':''}">${diff>0?'+':''}${won(diff)}</td>`;
          } else { const accrued=tot[it.k].paid-tot[it.k].noticed; const fb=accrued-tot[it.k].decided;
            return `<td>${won(tot[it.k].paid)}</td><td>${won(tot[it.k].noticed)}</td><td>${won(tot[it.k].decided)}</td><td class="${fb>0?'pos':fb<0?'neg':''}"><b>${fb>0?'+':''}${won(fb)}</b></td>`;
          }
        }).join('')}
      </tr></tfoot>
    </table></div></div>
  </div>
  <div class="card"><div class="card-b">
    <p style="font-size:12.5px;color:var(--ink2);line-height:1.7"><b>보는 법</b><br>${helpText}</p>
  </div></div>`;
  el.querySelectorAll('td.edit input').forEach(inp=>{
    inp.addEventListener('blur',()=>{const v=A2.parseNum(inp.value);inp.value=v?v.toLocaleString('ko-KR'):'';});
    inp.addEventListener('focus',()=>{const v=A2.parseNum(inp.value);inp.value=v||'';});
    inp.addEventListener('change',async()=>{
      const {emp,item}=inp.dataset; const v=A2.parseNum(inp.value);
      const dec=window._annualCache.decided;
      dec[emp]=dec[emp]||{};
      if(v) dec[emp][item]=v; else delete dec[emp][item];
      // Firestore 저장 (백그라운드)
      try{ window.__fb.setDoc(window.__fb.doc(window.__fb.db,'companies',window._annualCache.company,'annual',window._annualCache.year),{year:window._annualCache.year,decided:dec}); }catch(e){console.error(e);}
      // 재로드 없이 표만 다시 그림
      paintAnnual(document.getElementById('content'));
    });
  });
  attachGridNav([...el.querySelectorAll('td.edit input')]);
}
// 그 달에 데이터(공제 override나 고지)가 있는지
function monthHasData(md, emps){
  if(!md) return false;
  const hasOv = md.overrides && Object.keys(md.overrides).length>0 && Object.values(md.overrides).some(o=>o&&Object.keys(o).length>0);
  const hasIns = md.insurance && Object.keys(md.insurance).length>0 && Object.values(md.insurance).some(o=>o&&Object.keys(o).length>0);
  return hasOv || hasIns;
}
window.setAnnualTab = function(t){ window._annualTab=t; paintAnnual(document.getElementById('content')); };
window.toggleAnnualMonth = function(m){
  if(window._annualMonths.has(m)) window._annualMonths.delete(m); else window._annualMonths.add(m);
  paintAnnual(document.getElementById('content'));
};
window.annualSelectAll = function(on){
  const year=A2.state.month.split('-')[0];
  if(on){ for(let i=1;i<=12;i++) window._annualMonths.add(`${year}-${String(i).padStart(2,'0')}`); }
  else window._annualMonths.clear();
  paintAnnual(document.getElementById('content'));
};
window.exportAnnualXLSX = async function(){
  const XLSX=await ensureXLSX();
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(tableToAOA('annualTbl'));
  XLSX.utils.book_append_sheet(wb,ws,'연간합산');
  XLSX.writeFile(wb,`${coName()}_연간합산_${A2.state.month.split('-')[0]}.xlsx`);
  toast('엑셀 다운로드 완료');
};

})();

/* ===== BOOT ===== */
__bootInit();

</script>

<script>
/* 넓은 표(.fit)를 컨테이너 폭에 맞게 가로스크롤 없이 자동 축소 · 숫자는 한 줄 유지 */
(function(){
  function fitOne(t){
    var wrap=t.parentElement;
    if(!wrap||!wrap.classList.contains('tbl-wrap'))return;
    t.style.transform='';t.style.transformOrigin='top left';
    var natural=t.offsetWidth, avail=wrap.clientWidth;
    if(!natural||!avail)return;
    var s=avail/natural;
    if(s>1.25)s=1.25; // 남는 폭이 많아도 과하게 커지지 않도록 상한
    if(Math.abs(s-1)<0.01){
      t.style.transform='';wrap.style.height='';wrap.style.overflow='';
      return;
    }
    t.style.transform='scale('+s+')';
    wrap.style.height=(t.offsetHeight*s)+'px';
    wrap.style.overflow='hidden';
  }
  var seen=new WeakSet();
  var ro=('ResizeObserver'in window)?new ResizeObserver(function(es){
    es.forEach(function(e){
      var t=(e.target.tagName==='TABLE')?e.target:e.target.querySelector('table.fit');
      if(t)fitOne(t);
    });
  }):null;
  function setup(){
    document.querySelectorAll('#content table.fit').forEach(function(t){
      fitOne(t);
      if(ro&&!seen.has(t)){seen.add(t);ro.observe(t);if(t.parentElement)ro.observe(t.parentElement);}
    });
  }
  var content=document.getElementById('content');
  if(content){
    var mo=new MutationObserver(function(){clearTimeout(window.__fitT);window.__fitT=setTimeout(setup,60);});
    mo.observe(content,{childList:true,subtree:true});
  }
  window.addEventListener('resize',function(){clearTimeout(window.__fitR);window.__fitR=setTimeout(setup,80);});
  setTimeout(setup,300);
})();
</script>
